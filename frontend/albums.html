<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/albums.css">
    <link rel="stylesheet" href="css/shared.css">
  </head>
  <body>
    <script src="scripts/hared.js" defer></script>
    <script src="scripts/albums.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="grid">
      <div class="card">
        <div class="top-text-wrapper">
          <span class="date-text">3 photos</span>
          <span class="album-text">My Home</span>
          <span class="date-text">10MB size</span>
        </div> 
        <div class="album-images-wrapper">
          <img class="album-image" src="resources/test_cropped.jpg">
          <img class="album-image" src="resources/cat_cropped.png">
          <img class="album-image" src="resources/cat_cropped.png">
        </div>
      </div>
    </div>
    <div class="add-delete-edit-wrapper">
      <button class="add-btn">➕</button>
      <div class="edit-remove-container">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">🗑️</button>
      </div>
    </div>
    <dialog class="add-dialog">
      <form class="add-form">
        <span class="add-text">Add album</span>

        <span class="input-label">Album name</span>
        <input type="text" name="name" required>

        <span class="input-label">Album color</span>
        <input type="color" name="color" value="#3b82f6">

        <span class="input-label">Description (Optional)</span>
        <textarea name="description" rows="3" placeholder="Add a description…"></textarea>
      </form>
      <div class="form-actions">
        <button type="button" class="submit-btn">Add album</button>
        <button type="button" class="close-btn">Cancel</button>
      </div>
    </dialog>
  </body>
</html>
