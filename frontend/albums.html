<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/albums.css">
  </head>
  <body>
    <script src="shared.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="grid">
      <div class="card">
        <div class="top-text-wrapper">
          <span class="date-text">3 photos</span>
          <span class="album-text">My Home</span>
          <span class="date-text">10MB size</span>
        </div> 
        <div class="album-images-wrapper">
          <img class="album-image" src="resources/test_cropped.jpg">
          <img class="album-image" src="resources/cat_cropped.png">
          <img class="album-image" src="resources/cat_cropped.png">
        </div>
      </div>
    </div>
    <div class="add-delete-edit-wrapper">
      <button class="add-btn">➕</button>
      <div class="edit-remove-container">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">🗑️</button>
      </div>
    </div>
    <dialog id="add-dialog">
      <form class="add-form">
        <span class="add-text">Add photo</span>
        <input type="file" accept="image/*" required>

        <span class="input-label">Choose a date</span>
        <input type="date" required>

        <span class="input-label">Select an album</span>
        <select required>
          <option value="">Choose an album…</option>
          <option value="1">Wedding</option>
          <option value="2">Honeymoon</option>
        </select>

        <span class="input-label">Add people (Optional)</span>
        <select multiple size="4">
          <option value="1">Mother</option>
          <option value="2">Sister</option>
          <option value="3">Dad</option>
          <option value="4">Friend</option>
          <option value="5">Cousin</option>
        </select>

        <span class="input-label">Add description (Optional)</span>
        <textarea rows="3" placeholder="Add a description…"></textarea>
      </form>
      <div class="form-actions">
        <button type="submit" class="submit-btn">Add photo</button>
        <button type="button" class="close-btn">Cancel</button>
      </div>
    </dialog>
  </body>
</html>
