<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/albums.css">
    <link rel="stylesheet" href="css/shared.css">
  </head>
  <body>
    <script src="scripts/shared.js" defer></script>
    <script src="scripts/albums.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="grid">
    </div>
    <div class="filter-bar">
      <input type="text" name="filter_search" placeholder="Search by name">
      <button type="button" class="filter-apply-btn">Apply</button>
    </div>
    <div class="add-delete-edit-wrapper">
      <button class="add-btn">➕</button>
      <div class="edit-remove-container">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">🗑️</button>
      </div>
    </div>
    <dialog class="add-dialog">
      <form class="add-form">
        <span class="add-text">Add album</span>

        <span class="input-label">Album name</span>
        <input type="text" name="name" required>

        <span class="input-label">Album color</span>
        <input type="color" name="color" value="#dbeafe">

        <span class="input-label">Description (Optional)</span>
        <textarea name="description" rows="3" placeholder="Add a description…"></textarea>
      </form>
      <div class="form-actions">
        <button type="button" class="submit-btn add">Add album</button>
        <button type="button" class="close-btn add">Cancel</button>
      </div>
    </dialog>
    <dialog class="edit-dialog">
      <form class="edit-form" id="target-">
        <span class="edit-text">Edit album</span>

        <span class="input-label">Album name</span>
        <input type="text" name="name" required>

        <span class="input-label">Album color</span>
        <input type="color" name="color" value="#dbeafe">

        <span class="input-label">Description (Optional)</span>
        <textarea name="description" rows="3" placeholder="Add a description…"></textarea>
        <div class="form-actions">
          <button type="button" class="submit-btn edit">Edit album</button>
          <button type="button" class="close-btn edit">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
