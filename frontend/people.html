<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/people.css">
    <link rel="stylesheet" href="css/shared.css">
  </head>
  <body>
    <script src="scripts/shared.js" defer></script>
    <script src="scripts/people.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="people-grid">
      <div class="person-container">
        <button class="add-person-btn">✚</button>
      </div>
    </div>
    <dialog class="add-dialog">
      <form class="add-form">
        <span class="add-text">Add person</span>

        <span class="input-label">Name</span>
        <input type="text" name="name" required>

        <span class="input-label">Avatar photo</span>
        <select name="avatar_id" required>
          <option value="">Choose a photo…</option>
        </select>

        <span class="input-label">Linked photo</span>
        <select name="photo_id" required>
          <option value="">Choose a photo…</option>
        </select>
      </form>
      <div class="form-actions">
        <button type="button" class="submit-btn add">Add person</button>
        <button type="button" class="close-btn add">Cancel</button>
      </div>
    </dialog>
    <dialog class="edit-dialog">
      <form class="edit-form" id="target-">
        <span class="edit-text">Edit person</span>

        <span class="input-label">Name</span>
        <input type="text" name="name" required>

        <span class="input-label">Avatar photo</span>
        <select name="avatar_id" required>
          <option value="">Choose a photo…</option>
        </select>

        <span class="input-label">Linked photo</span>
        <select name="photo_id" required>
          <option value="">Choose a photo…</option>
        </select>
        <div class="form-actions">
          <button type="button" class="submit-btn edit">Edit person</button>
          <button type="button" class="close-btn edit">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
