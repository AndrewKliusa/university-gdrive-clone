<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/photos.css">
    <link rel="stylesheet" href="css/shared.css">
  </head>
  <body>
    <script src="shared.js" defer></script>
    <script src="photo.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="grid">
      <div class="card photo-hover">
        <div class="photo-top">
          <span class="date-text">04.03.08</span>
          <div class="people-images-wrapper">
            <img class="person-image" src="resources/test_cropped.jpg">
            <img class="person-image" src="resources/cat_cropped.png">
            <img class="person-image" src="resources/cat_cropped.png">
            <img class="person-image" src="resources/cat_cropped.png">
            <img class="person-image" src="resources/cat_cropped.png">
          </div>
          <span class="album-text">My Home</span>
        </div>
        <img class="main-image" src="resources/cat.png">
        <span class="card-caption">sdfgfsgsfdgsfd sdfgdfsgfsgsdfgd dfsgsdfgdf</span>
      </div>
      <div class="card photo-hover">
        <div class="photo-top">
          <span class="date-text">04 March 2008</span>
          <div class="people-images-wrapper">
            <img class="person-image" src="resources/test_cropped.jpg">
            <img class="person-image" src="resources/cat_cropped.png">
          </div>
          <div class="album-text">
            <span >Me</span>
          </div>
        </div>
        <img class="main-image" src="resources/cat.png">
        <span class="card-caption">sdfgfsgsfdgsfd sdfgdfsgfsgsdfgd dfsgsdfgdf</span>
      </div>
    </div>
    <div class="add-delete-edit-wrapper">
      <button class="add-btn">➕</button>
      <div class="edit-remove-container">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">🗑️</button>
      </div>
    </div>
    <dialog class="add-dialog">
      <form class="add-form">
        <span class="add-text">Add photo</span>
        <input type="file" name="photo" accept="image/*" required>

        <span class="input-label">Choose a date</span>
        <input type="date" name="date" required>

        <span class="input-label">Select an album</span>
        <select name="album" required>
          <option value="">Choose an album…</option>
          <option value="1">Wedding</option>
          <option value="2">Honeymoon</option>
        </select>

        <span class="input-label">Add people (Optional)</span>
        <select name="people" multiple size="4">
          <option value="1">Mother</option>
          <option value="2">Sister</option>
          <option value="3">Dad</option>
          <option value="4">Friend</option>
          <option value="5">Cousin</option>
        </select>

        <span class="input-label">Add description (Optional)</span>
        <textarea name="description" rows="3" placeholder="Add a description…"></textarea>
      </form>
      <div class="form-actions">
        <button type="submit" class="submit-btn">Add photo</button>
        <button type="button" class="close-btn">Cancel</button>
      </div>
    </dialog>
  </body>
</html>
