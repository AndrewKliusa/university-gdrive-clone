<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link rel="stylesheet" href="css/photos.css">
    <link rel="stylesheet" href="css/shared.css">
  </head>
  <body>
    <script src="scripts/shared.js" defer></script>
    <script src="scripts/photos.js" defer></script>
    <nav class="navigation">
        <span class="navigation-span">Photo Drive</span>
        <div class="nav-links">
          <a href="photos.html">Photos</a>
          <a href="albums.html">Albums</a>
          <a href="people.html">People</a>
        </div>
    </nav>
    <div class="grid">
    </div>
    <div class="add-delete-edit-wrapper">
      <button class="add-btn">➕</button>
      <div class="edit-remove-container">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">🗑️</button>
      </div>
    </div>
    <dialog class="add-dialog">
      <form class="add-form">
        <span class="add-text">Add photo</span>
        <input type="file" name="photo" accept="image/*" required>

        <span class="input-label">Photo date</span>
        <input type="date" name="taken_at" required>

        <span class="input-label">Select an album</span>
        <select name="album_id">
          <option value="">Choose an album…</option>
        </select>

        <span class="input-label">Add people (Optional)</span>
        <select name="people" multiple size="4">
        </select>

        <span class="input-label">Add description (Optional)</span>
        <textarea name="caption" rows="3" placeholder="Add a description…"></textarea>
      </form>
      <div class="form-actions">
        <button type="button" class="submit-btn add">Add photo</button>
        <button type="button" class="close-btn add">Cancel</button>
      </div>
    </dialog>
    <dialog class="edit-dialog">
      <form class="edit-form" id="target-">
        <span class="edit-text">Edit photo</span>
        <input type="file" name="photo" accept="image/*">

        <span class="input-label">Photo date</span>
        <input type="date" name="taken_at" required>

        <span class="input-label">Select an album</span>
        <select name="album_id">
          <option value="">Choose an album…</option>
        </select>

        <span class="input-label">Add people (Optional)</span>
        <select name="people" multiple size="4">
        </select>

        <span class="input-label">Add description (Optional)</span>
        <textarea name="caption" rows="3" placeholder="Add a description…"></textarea>
        <div class="form-actions">
          <button type="button" class="submit-btn edit">Add photo</button>
          <button type="button" class="close-btn edit">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
